<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>缺課管理</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="缺課管理">

<style>
body{margin:0;font-family:-apple-system;background:#f2f4f8;}
.header{background:#2f6bff;color:#fff;padding:20px;font-size:20px;}
.container{padding:15px;padding-bottom:100px;}
.card{background:#fff;border-radius:14px;padding:15px;margin-bottom:12px;}
.item{display:flex;justify-content:space-between;margin:6px 0;}
button{background:#2f6bff;color:#fff;border:none;padding:6px 10px;border-radius:8px;}
button:disabled{background:#ccc;}
.del{background:#ff3b30;}

.progress{
height:6px;
background:#eee;
border-radius:10px;
margin-top:5px;
}
.bar{
height:100%;
background:#2f6bff;
border-radius:10px;
}
.warn .bar{background:#ff9500;}
.danger .bar{background:#ff3b30;}

.nav{
position:fixed;bottom:20px;left:50%;
transform:translateX(-50%);
width:90%;background:#fff;
display:flex;justify-content:space-around;
padding:10px;border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.page{display:none;}
.active{display:block;}
</style>
</head>

<body>

<div class="header">缺課管理</div>

<div class="container">

<!-- 課表 -->
<div id="page1" class="page active">
<div class="card" id="schedule"></div>

<div class="card">
<h3>區間請假</h3>
<input type="date" id="start">
<input type="date" id="end">
<button onclick="addRange()">請假</button>
</div>
</div>

<!-- 補登 -->
<div id="page2" class="page">
<div class="card">
<h3>補登</h3>
<input type="date" id="manualDate">
<select id="manualPeriod"></select>
<button onclick="addManual()">補登</button>
</div>
</div>

<!-- 統計（含進度條） -->
<div id="page3" class="page">
<div class="card">
<h3>統計</h3>
<div id="stats"></div>
</div>
</div>

<!-- 紀錄 -->
<div id="page4" class="page">
<div class="card">
<h3>紀錄</h3>
<div id="history"></div>
</div>
<button class="del" onclick="clearAll()">全部清除</button>
</div>

<!-- 設定 -->
<div id="page5" class="page">
<div class="card">
<h3>學期</h3>
<input type="date" id="termStart">
<input type="date" id="termEnd">
<button onclick="saveTerm()">儲存</button>
</div>

<div class="card">
<h3>課表</h3>
<div id="editor"></div>
<button onclick="saveSchedule()">儲存課表</button>
</div>
</div>

</div>

<div class="nav">
<div onclick="showPage(1)">課表</div>
<div onclick="showPage(2)">補登</div>
<div onclick="showPage(3)">統計</div>
<div onclick="showPage(4)">紀錄</div>
<div onclick="showPage(5)">設定</div>
</div>

<script>

// ⭐ 資料
let schedule=JSON.parse(localStorage.getItem("schedule"))||{
1:["微積分導論（二）","微積分導論（二）","英文閱讀與寫作","體育","數學甲","語文表達與傳播應用","悅讀樂科學（二）"],
2:["彈性學習時間","英語聽講","數學甲","選修物理－電磁現象二與量子現象","藝術生活","各類文學選讀","各類文學選讀"],
3:["語文表達與傳播應用","數學甲","選修化學－化學反應與平衡二","英文閱讀與寫作","未來想像與生涯進路","體育","選修物理－電磁現象二與量子現象"],
4:["英語聽講","選修化學－化學反應與平衡二","領域課程：機器人專題","領域課程：機器人專題","數學甲","領域課程：科技應用專題","選修物理－波動、光及聲音"],
5:["彈性學習時間","家政","多元體育課程（二）","選修化學－有機化學與應用科技","團體活動時間","團體活動時間","團體活動時間"]
};

let records=JSON.parse(localStorage.getItem("records")||"[]");
let warned=JSON.parse(localStorage.getItem("warned")||"{}");

let termStart=localStorage.getItem("termStart")||"2026-02-23";
let termEnd=localStorage.getItem("termEnd")||"2026-06-04";

function showPage(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+n).classList.add("active");
}

function todayStr(){return new Date().toLocaleDateString();}

// 課表
function renderSchedule(){
let d=new Date().getDay();
let today=schedule[d]||[];

let html="";
today.forEach((c,i)=>{
let exists=records.some(r=>r.date===todayStr()&&r.period===i);

html+=`
<div class="item">
第${i+1}節 ${c}
<button ${exists?"disabled":""} onclick="add(${i})">
${exists?"已記錄":"缺課"}
</button>
</div>`;
});
document.getElementById("schedule").innerHTML=html||"今天沒課";
}

// 新增缺課
function add(i){
let d=new Date();
let date=todayStr();
let course=schedule[d.getDay()][i];

if(records.some(r=>r.date===date && r.period===i)) return;

records.push({date,period:i,course});
save();renderAll();checkWarning();
}

// 補登
let sel=document.getElementById("manualPeriod");
for(let i=0;i<7;i++){
let o=document.createElement("option");
o.value=i;o.text="第"+(i+1)+"節";
sel.appendChild(o);
}

function addManual(){
let d=new Date(document.getElementById("manualDate").value);
let p=parseInt(sel.value);

let course=schedule[d.getDay()]?.[p];
if(!course)return alert("沒課");

let date=d.toLocaleDateString();

if(records.some(r=>r.date===date && r.period===p)) return;

records.push({date,period:p,course});
save();renderAll();checkWarning();
}

// 區間請假
function addRange(){
let s=new Date(document.getElementById("start").value);
let e=new Date(document.getElementById("end").value);

while(s<=e){
let day=s.getDay();
let dateStr=s.toLocaleDateString();

if(schedule[day]){
schedule[day].forEach((c,i)=>{
if(!records.some(r=>r.date===dateStr && r.period===i)){
records.push({date:dateStr,period:i,course:c});
}
});
}
s.setDate(s.getDate()+1);
}
save();renderAll();checkWarning();
}

// 精準計算
function calcTotals(){
let totals={};
let s=new Date(termStart);
let e=new Date(termEnd);

while(s<=e){
let day=s.getDay();
if(schedule[day]){
schedule[day].forEach(c=>{
totals[c]=(totals[c]||0)+1;
});
}
s.setDate(s.getDate()+1);
}
return totals;
}

// 📊 統計＋進度條
function renderStats(){
let totals=calcTotals();
let map={};
records.forEach(r=>map[r.course]=(map[r.course]||0)+1);

let html="";
for(let c in totals){
let n=map[c]||0;
let t=totals[c];
let rate=n/t;

let cls=rate>=0.33?"danger":rate>=0.2?"warn":"";

html+=`
<div class="${cls}">
${c} ${n}/${t} (${Math.round(rate*100)}%)
<div class="progress">
<div class="bar" style="width:${rate*100}%"></div>
</div>
</div>`;
}
document.getElementById("stats").innerHTML=html;
}

// 紀錄
function renderHistory(){
let html="";
records.forEach((r,i)=>{
html+=`${r.date} 第${r.period+1}節 ${r.course} <button onclick="del(${i})">刪</button><br>`;
});
document.getElementById("history").innerHTML=html;
}

function del(i){
records.splice(i,1);
save();renderAll();
}

// 清除
function clearAll(){
if(!confirm("確定全部清除？")) return;
localStorage.clear();
location.reload();
}

// 儲存
function save(){
localStorage.setItem("records",JSON.stringify(records));
localStorage.setItem("warned",JSON.stringify(warned));
}

// 提醒
function checkWarning(){
let totals=calcTotals();
let map={};
records.forEach(r=>map[r.course]=(map[r.course]||0)+1);

for(let c in map){
let rate=map[c]/totals[c];

if(rate>=0.2 && !warned[c+"_20"]){
alert("⚠️ "+c+" 已達1/5");
warned[c+"_20"]=true;
}
if(rate>=0.33 && !warned[c+"_33"]){
alert("🚨 "+c+" 已達1/3");
warned[c+"_33"]=true;
}
}
save();
}

// 設定
function saveTerm(){
termStart=document.getElementById("termStart").value;
termEnd=document.getElementById("termEnd").value;
localStorage.setItem("termStart",termStart);
localStorage.setItem("termEnd",termEnd);
renderAll();
}

// 課表編輯
function renderEditor(){
let html="";
for(let d=1;d<=5;d++){
html+="週"+d+": ";
schedule[d].forEach((c,i)=>{
html+=`<input value="${c}" onchange="schedule[${d}][${i}]=this.value">`;
});
html+="<br>";
}
document.getElementById("editor").innerHTML=html;
}

function saveSchedule(){
localStorage.setItem("schedule",JSON.stringify(schedule));
renderAll();
}

// 初始化
function renderAll(){
renderSchedule();
renderStats();
renderHistory();
renderEditor();
document.getElementById("termStart").value=termStart;
document.getElementById("termEnd").value=termEnd;
}

renderAll();

</script>

</body>
</html>
