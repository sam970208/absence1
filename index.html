<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>缺課管理</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<style>
body{margin:0;font-family:-apple-system;background:#f2f4f8;}
.header{background:#2f6bff;color:#fff;padding:20px;font-size:20px;}
.container{padding:15px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:12px;}
.item{display:flex;justify-content:space-between;margin:6px 0;}
.btn{background:#2f6bff;color:#fff;border:none;padding:6px 10px;border-radius:10px;}
.progress{height:6px;background:#eee;border-radius:10px;margin-top:5px;}
.bar{height:100%;background:#2f6bff;border-radius:10px;}
.danger .bar{background:#ff3b30;}
.nav{position:fixed;bottom:0;left:0;right:0;background:#fff;display:flex;justify-content:space-around;padding:10px;border-top:1px solid #ddd;}
.nav div{cursor:pointer}
.page{display:none;}
.active{display:block;}
</style>
</head>

<body>

<div class="header">缺課管理</div>

<div class="container">

<!-- 課表 -->
<div id="page1" class="page active">
<div class="card" id="schedule"></div>

<div class="card">
<h3>📅 區間請假</h3>
<input type="date" id="start">
<input type="date" id="end">
<button class="btn" onclick="addRange()">請假</button>
</div>
</div>

<!-- 統計 -->
<div id="page2" class="page">
<div class="card"><h3>📊 統計</h3><div id="stats"></div></div>
</div>

<!-- 紀錄 -->
<div id="page3" class="page">
<div class="card"><h3>📅 紀錄</h3><div id="history"></div></div>
</div>

<!-- 設定 -->
<div id="page4" class="page">
<div class="card">
<h3>⚙️ 設定</h3>
<button class="btn" onclick="clearData()">清除全部資料</button>
</div>
</div>

</div>

<div class="nav">
<div onclick="showPage(1)">課表</div>
<div onclick="showPage(2)">統計</div>
<div onclick="showPage(3)">紀錄</div>
<div onclick="showPage(4)">設定</div>
</div>

<script>
const schedule={
1:["微積分導論（二）","微積分導論（二）","英文閱讀與寫作","體育","數學甲","語文表達與傳播應用","悅讀樂科學（二）"],
2:["彈性學習時間","英語聽講","數學甲","選修物理－電磁現象二與量子現象","藝術生活","各類文學選讀","各類文學選讀"],
3:["語文表達與傳播應用","數學甲","選修化學－化學反應與平衡二","英文閱讀與寫作","未來想像與生涯進路","體育","選修物理－電磁現象二與量子現象"],
4:["英語聽講","選修化學－化學反應與平衡二","領域課程：機器人專題","領域課程：機器人專題","數學甲","領域課程：科技應用專題","選修物理－波動、光及聲音"],
5:["彈性學習時間","家政","多元體育課程（二）","選修化學－有機化學與應用科技","團體活動時間","團體活動時間","團體活動時間"]
};

let records=JSON.parse(localStorage.getItem("records")||"[]");

function showPage(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+n).classList.add("active");
}

let d=new Date().getDay();
let today=schedule[d]||[];

let html="";
today.forEach((c,i)=>{
html+=`<div class="item">
<span>第${i+1}節 ${c}</span>
<button class="btn" onclick="add('${c}')">缺課</button>
</div>`;
});
document.getElementById("schedule").innerHTML=html||"今天沒課";

function add(c){
records.push({c,date:new Date().toLocaleDateString()});
save();update();notify();
}

function addRange(){
let s=document.getElementById("start").value;
let e=document.getElementById("end").value;

let start=new Date(s);
let end=new Date(e);

while(start<=end){
let day=start.getDay();
if(schedule[day]){
schedule[day].forEach(c=>{
records.push({c,date:start.toLocaleDateString()});
});
}
start.setDate(start.getDate()+1);
}

save();update();notify();
}

function save(){
localStorage.setItem("records",JSON.stringify(records));
}

function update(){
let map={};
records.forEach(r=>map[r.c]=(map[r.c]||0)+1);

let stats="",history="";
for(let c in map){
let n=map[c],t=28;
if(c==="數學甲")t=56;
if(c==="團體活動時間")t=42;

let rate=n/t;
stats+=`
<div class="${rate>=0.33?'danger':''}">
${c} ${n}/${t}
<div class="progress"><div class="bar" style="width:${rate*100}%"></div></div>
</div>`;
}

records.forEach(r=>{
history+=`<div>${r.date} ${r.c}</div>`;
});

document.getElementById("stats").innerHTML=stats;
document.getElementById("history").innerHTML=history;
}

function clearData(){
if(confirm("確定清除？")){
records=[];
save();
update();
}
}

function notify(){
let map={};
records.forEach(r=>map[r.c]=(map[r.c]||0)+1);

for(let c in map){
let rate=map[c]/28;
if(rate>=0.33){
alert("⚠️ "+c+" 已達1/3缺課");
return;
}
}
}

update();
</script>

</body>
</html>
