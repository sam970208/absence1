<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>缺課管理</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="缺課管理">
<link rel="apple-touch-icon" href="icon.png">

<style>
body{margin:0;font-family:-apple-system;background:#f2f4f8;padding:15px;}
.card{background:#fff;border-radius:16px;padding:12px;margin-bottom:10px;}
button{background:#007aff;color:#fff;border:none;padding:6px 10px;border-radius:8px;}
.item{display:flex;justify-content:space-between;margin:6px 0;}
.progress{height:6px;background:#ddd;border-radius:10px;}
.bar{height:100%;background:#007aff;border-radius:10px;}
.danger .bar{background:#ff3b30;}
</style>
</head>

<body>

<h2 id="day"></h2>

<div class="card" id="schedule"></div>

<div class="card">
<h3>📅 區間請假</h3>
<input type="date" id="start">
<input type="date" id="end">
<button onclick="addRange()">請假</button>
</div>

<div class="card">
<h3>📊 統計</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>🏆 排行榜</h3>
<div id="rank"></div>
</div>

<script>
const schedule={
1:["微積分導論（二）","微積分導論（二）","英文閱讀與寫作","體育","數學甲","語文表達與傳播應用","悅讀樂科學（二）"],
2:["彈性學習時間","英語聽講","數學甲","選修物理－電磁現象二與量子現象","藝術生活","各類文學選讀","各類文學選讀"],
3:["語文表達與傳播應用","數學甲","選修化學－化學反應與平衡二","英文閱讀與寫作","未來想像與生涯進路","體育","選修物理－電磁現象二與量子現象"],
4:["英語聽講","選修化學－化學反應與平衡二","領域課程：機器人專題","領域課程：機器人專題","數學甲","領域課程：科技應用專題","選修物理－波動、光及聲音"],
5:["彈性學習時間","家政","多元體育課程（二）","選修化學－有機化學與應用科技","團體活動時間","團體活動時間","團體活動時間"]
};

let records=JSON.parse(localStorage.getItem("records")||"[]");

let d=new Date().getDay();
let names=["日","一","二","三","四","五","六"];
document.getElementById("day").innerText="今天：星期"+names[d];

let today=schedule[d]||[];
let html="";
today.forEach((c,i)=>{
html+=`<div class="item">
<span>第${i+1}節 ${c}</span>
<button onclick="add('${c}')">缺課</button>
</div>`;
});
document.getElementById("schedule").innerHTML=html||"今天沒課";

function add(c){
records.push({c,date:new Date().toLocaleDateString()});
save();update();notify();
}

function addRange(){
let s=document.getElementById("start").value;
let e=document.getElementById("end").value;
if(!s||!e)return alert("選日期");

let start=new Date(s);
let end=new Date(e);

while(start<=end){
let day=start.getDay();
if(schedule[day]){
schedule[day].forEach(c=>{
records.push({c,date:start.toLocaleDateString()});
});
}
start.setDate(start.getDate()+1);
}

save();update();notify();
}

function save(){
localStorage.setItem("records",JSON.stringify(records));
}

function total(c){
if(c==="數學甲")return 56;
if(c==="團體活動時間")return 42;
return 28;
}

function update(){
let map={};
records.forEach(r=>map[r.c]=(map[r.c]||0)+1);

let stats="";
for(let c in map){
let n=map[c],t=total(c),rate=n/t;
stats+=`
<div class="${rate>=0.33?'danger':''}">
${c} ${n}/${t}
<div class="progress"><div class="bar" style="width:${rate*100}%"></div></div>
</div>`;
}
document.getElementById("stats").innerHTML=stats||"尚無";

let arr=Object.entries(map).sort((a,b)=>b[1]-a[1]);
document.getElementById("rank").innerHTML=
arr.map(i=>`<div>${i[0]} ${i[1]}</div>`).join("")||"尚無";
}

function notify(){
if(Notification.permission!=="granted"){
Notification.requestPermission();
return;
}

let map={};
records.forEach(r=>map[r.c]=(map[r.c]||0)+1);

for(let c in map){
let rate=map[c]/total(c);
if(rate>=0.33){
new Notification("⚠️ 缺課警告",{body:c+" 已達1/3缺課"});
return;
}
}
}

update();
</script>

</body>
</html>
