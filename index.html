<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>缺課管理</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="缺課管理">

<style>
body{margin:0;font-family:-apple-system;background:#f2f4f8;}
.header{background:#2f6bff;color:#fff;padding:20px;font-size:20px;}
.container{padding:15px;padding-bottom:100px;}
.card{background:#fff;border-radius:16px;padding:15px;margin-bottom:12px;}
.item{display:flex;justify-content:space-between;margin:6px 0;}
.btn{background:#2f6bff;color:#fff;border:none;padding:6px 10px;border-radius:10px;}
.btn:disabled{background:#ccc;}
.del{background:#ff3b30;}
.nav{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
width:90%;background:#fff;display:flex;justify-content:space-around;
padding:12px;border-radius:20px;box-shadow:0 5px 20px rgba(0,0,0,0.1);}
.page{display:none;}
.active{display:block;}
.progress{height:6px;background:#eee;border-radius:10px;margin-top:5px;}
.bar{height:100%;background:#2f6bff;border-radius:10px;}
.warn .bar{background:#ff9500;}
.danger .bar{background:#ff3b30;}
</style>
</head>

<body>

<div class="header">缺課管理</div>

<div class="container">

<!-- 課表 -->
<div id="page1" class="page active">
<div class="card" id="schedule"></div>

<div class="card">
<h3>📆 區間請假</h3>
<input type="date" id="start">
<input type="date" id="end">
<button class="btn" onclick="addRange()">整段請假</button>
</div>
</div>

<!-- 補登 -->
<div id="page2" class="page">
<div class="card">
<h3>補登</h3>
<input type="date" id="manualDate">
<select id="manualPeriod">
<option value="0">第1節</option>
<option value="1">第2節</option>
<option value="2">第3節</option>
<option value="3">第4節</option>
<option value="4">第5節</option>
<option value="5">第6節</option>
<option value="6">第7節</option>
</select>
<button class="btn" onclick="addManual()">補登</button>
</div>
</div>

<!-- 統計 -->
<div id="page3" class="page">
<div class="card"><h3>統計</h3><div id="stats"></div></div>
</div>

<!-- 紀錄 -->
<div id="page4" class="page">
<div class="card"><h3>紀錄</h3><div id="history"></div></div>
<div class="card">
<button class="btn del" onclick="clearAll()">全部清除</button>
</div>
</div>

</div>

<div class="nav">
<div onclick="showPage(1)">課表</div>
<div onclick="showPage(2)">補登</div>
<div onclick="showPage(3)">統計</div>
<div onclick="showPage(4)">紀錄</div>
</div>

<script>
const schedule={
1:["微積分導論（二）","微積分導論（二）","英文閱讀與寫作","體育","數學甲","語文表達與傳播應用","悅讀樂科學（二）"],
2:["彈性學習時間","英語聽講","數學甲","選修物理－電磁現象二與量子現象","藝術生活","各類文學選讀","各類文學選讀"],
3:["語文表達與傳播應用","數學甲","選修化學－化學反應與平衡二","英文閱讀與寫作","未來想像與生涯進路","體育","選修物理－電磁現象二與量子現象"],
4:["英語聽講","選修化學－化學反應與平衡二","領域課程：機器人專題","領域課程：機器人專題","數學甲","領域課程：科技應用專題","選修物理－波動、光及聲音"],
5:["彈性學習時間","家政","多元體育課程（二）","選修化學－有機化學與應用科技","團體活動時間","團體活動時間","團體活動時間"]
};

let records=JSON.parse(localStorage.getItem("records")||"[]");
let warned=JSON.parse(localStorage.getItem("warned")||"{}");

function showPage(n){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
document.getElementById("page"+n).classList.add("active");
}

function todayStr(){ return new Date().toLocaleDateString(); }

// 課表
function renderSchedule(){
let d=new Date().getDay();
let today=schedule[d]||[];
let html="";

today.forEach((c,i)=>{
let exists=records.some(r=>r.date===todayStr() && r.period===i);

html+=`
<div class="item">
<span>第${i+1}節 ${c}</span>
<button class="btn" ${exists?"disabled":""} onclick="add(${i})">
${exists?"已記錄":"缺課"}
</button>
</div>`;
});

document.getElementById("schedule").innerHTML=html||"今天沒課";
}

function add(i){
let d=new Date();
let date=d.toLocaleDateString();
let course=schedule[d.getDay()][i];

if(records.some(r=>r.date===date && r.period===i)) return;

records.push({date,period:i,course});
save();renderAll();checkWarning();
}

// 區間請假
function addRange(){
let s=document.getElementById("start").value;
let e=document.getElementById("end").value;
if(!s||!e) return alert("請選日期");

let start=new Date(s);
let end=new Date(e);

while(start<=end){
let day=start.getDay();
let dateStr=start.toLocaleDateString();

if(schedule[day]){
schedule[day].forEach((c,i)=>{
if(!records.some(r=>r.date===dateStr && r.period===i)){
records.push({date:dateStr,period:i,course:c});
}
});
}
start.setDate(start.getDate()+1);
}

save();renderAll();checkWarning();
}

// 補登
function addManual(){
let d=document.getElementById("manualDate").value;
let p=parseInt(document.getElementById("manualPeriod").value);

if(!d)return alert("請選日期");

let dateObj=new Date(d);
let course=schedule[dateObj.getDay()]?.[p];
if(!course)return alert("這節沒課");

let dateStr=dateObj.toLocaleDateString();
if(records.some(r=>r.date===dateStr && r.period===p)) return;

records.push({date:dateStr,period:p,course});
save();renderAll();checkWarning();
}

// 統計
function renderStats(){
let map={};
records.forEach(r=>map[r.course]=(map[r.course]||0)+1);

let html="";
for(let c in map){
let n=map[c];
let t=28;
if(c==="數學甲")t=56;
if(c==="團體活動時間")t=42;

let rate=n/t;
let cls=rate>=0.33?"danger":rate>=0.2?"warn":"";

html+=`
<div class="${cls}">
${c} ${n}/${t}
<div class="progress"><div class="bar" style="width:${rate*100}%"></div></div>
</div>`;
}
document.getElementById("stats").innerHTML=html;
}

// 紀錄
function renderHistory(){
let html="";
records.forEach((r,i)=>{
html+=`
<div class="item">
<span>${r.date} 第${r.period+1}節 ${r.course}</span>
<button class="btn del" onclick="del(${i})">刪</button>
</div>`;
});
document.getElementById("history").innerHTML=html;
}

function del(i){
records.splice(i,1);
save();renderAll();
}

// 🔥 全部清除（最強版）
function clearAll(){
if(!confirm("⚠️ 確定全部清除？不可復原")) return;

localStorage.clear();
records=[];
warned={};

document.getElementById("schedule").innerHTML="";
document.getElementById("stats").innerHTML="";
document.getElementById("history").innerHTML="";

setTimeout(()=>location.reload(),200);
}

function save(){
localStorage.setItem("records",JSON.stringify(records));
localStorage.setItem("warned",JSON.stringify(warned));
}

// 預警
function checkWarning(){
let map={};
records.forEach(r=>map[r.course]=(map[r.course]||0)+1);

for(let c in map){
let n=map[c];
let t=28;
if(c==="數學甲")t=56;
if(c==="團體活動時間")t=42;

let rate=n/t;

if(rate>=0.2 && !warned[c+"_20"]){
alert("⚠️ "+c+" 已達1/5");
warned[c+"_20"]=true;
}
if(rate>=0.33 && !warned[c+"_33"]){
alert("🚨 "+c+" 已達1/3");
warned[c+"_33"]=true;
}
}
save();
}

function renderAll(){
renderSchedule();
renderStats();
renderHistory();
}

renderAll();
</script>

</body>
</html>
